<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" width="720" height="600">
  <defs>
    <style>
      .h-top { fill: #7F77DD; }
      .h-section { fill: #5EEAD4; }
      .h-page { fill: #E5E7EB; }
      .h-infra { fill: #FCA5A5; }
      .t-title { font: bold 16px -apple-system, system-ui, sans-serif; fill: #1F2937; }
      .t-section { font: bold 14px -apple-system, system-ui, sans-serif; fill: #1F2937; }
      .t-page { font: 12px -apple-system, system-ui, sans-serif; fill: #4B5563; }
      .t-sub { font: 11px -apple-system, system-ui, sans-serif; fill: #fff; }
      .t-infra-h { font: bold 13px -apple-system, system-ui, sans-serif; fill: #7F1D1D; }
      .t-infra { font: 11px -apple-system, system-ui, sans-serif; fill: #991B1B; }
    </style>
  </defs>

  <!-- Top -->
  <rect x="270" y="20" width="180" height="48" rx="8" class="h-top"/>
  <text x="360" y="42" text-anchor="middle" font-weight="bold" fill="#fff" font-size="16">POLLMEVALS</text>
  <text x="360" y="60" text-anchor="middle" class="t-sub">pollmevals.com</text>

  <!-- Section: Data -->
  <rect x="20" y="100" width="160" height="40" rx="8" class="h-section"/>
  <text x="100" y="124" text-anchor="middle" class="t-section">Data</text>

  <rect x="20" y="148" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="168" text-anchor="middle" class="t-page">/leaderboards</text>
  <rect x="20" y="184" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="204" text-anchor="middle" class="t-page">/models/[slug]</text>
  <rect x="20" y="220" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="240" text-anchor="middle" class="t-page">/stacks/[slug]</text>
  <rect x="20" y="256" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="276" text-anchor="middle" class="t-page">/tasks/[slug]</text>
  <rect x="20" y="292" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="312" text-anchor="middle" class="t-page">/compare</text>
  <rect x="20" y="328" width="160" height="32" rx="6" class="h-page"/>
  <text x="100" y="348" text-anchor="middle" class="t-page">/runs/[hash]</text>

  <!-- Section: Methodology -->
  <rect x="200" y="100" width="160" height="40" rx="8" class="h-section"/>
  <text x="280" y="124" text-anchor="middle" class="t-section">Methodology</text>

  <rect x="200" y="148" width="160" height="32" rx="6" class="h-page"/>
  <text x="280" y="168" text-anchor="middle" class="t-page">/methodology</text>
  <rect x="200" y="184" width="160" height="32" rx="6" class="h-page"/>
  <text x="280" y="204" text-anchor="middle" class="t-page">/judges</text>
  <rect x="200" y="220" width="160" height="32" rx="6" class="h-page"/>
  <text x="280" y="240" text-anchor="middle" class="t-page">/calibration</text>
  <rect x="200" y="256" width="160" height="32" rx="6" class="h-page"/>
  <text x="280" y="276" text-anchor="middle" class="t-page">/scoring</text>
  <rect x="200" y="292" width="160" height="32" rx="6" class="h-page"/>
  <text x="280" y="312" text-anchor="middle" class="t-page">/blog</text>

