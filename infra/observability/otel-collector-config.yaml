# OpenTelemetry Collector config — receives OTLP from POLLMEVALS services,
# fans out to Tempo (traces) + Prometheus (metrics) + Loki (logs).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 100

  # Add POLLMEVALS service.namespace tag if not set by emitter
  resource:
    attributes:
      - key: service.namespace
        value: pollmevals
        action: upsert

exporters:
  # Traces → Tempo (OTLP gRPC native)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Metrics → Prometheus remote write (Prometheus v3 supports OTLP receiver but
  # for simplicity we use Prometheus exporter — scraped by Prometheus directly
  # from collector's /metrics on port 8889).
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: pollmevals

  # Logs → Loki
  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  # Debug — print to stdout
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [loki, debug]
