# LiteLLM proxy configuration for POLLMEVALS v0.1 smoke run
#
# Routes 5 ADR-003 models via the most reliable backend per provider:
# - 4 closed/popular models via OpenRouter (confirmed working via EVID-019 smoke)
# - qwen-3-14b via HuggingFace router → Cerebras provider
#   (EVID-019 confirmed qwen-3-14b NOT on OpenRouter; HF Inference Providers
#   has Cerebras as backend per HF docs; LiteLLM speaks HF via openai-compatible
#   custom base_url since HF router is OpenAI drop-in)
#
# Slug names confirmed by `make openrouter-smoke` 2026-05-24 (EVID-019).
# Never commit a literal API key — use os.environ/* references only.
# Pulled into the container via volume mount in docker-compose.litellm.yml.

model_list:
  # Slot 1 — Premium closed: Claude Sonnet 4.6 via OpenRouter
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 2 — Mid closed: GPT-5 mini via OpenRouter
  # NOTE: GPT-5 family requires max_tokens >= 16 (reasoning tokens reserved);
  # orchestrator must enforce minimum in request shape.
  - model_name: gpt-5-mini
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 3 — Cheap closed: Gemini 3 Flash via OpenRouter
  # NOTE: resolved to :preview suffix (EVID-019); monitor production stability.
  - model_name: gemini-3-flash
    litellm_params:
      model: openrouter/google/gemini-3-flash-preview
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 4 — Open-weight: Qwen 3 14B via HuggingFace router (auto-route)
  # Diverges from OpenRouter (NOT on OR per EVID-019); HF picks best backend.
  # LiteLLM treats HF router as OpenAI-compatible via custom base_url.
  # Slug is CASE-SENSITIVE on HF Hub: `Qwen/Qwen3-14B` not `qwen/qwen3-14b`.
  # NO provider suffix — HF auto-routes (`:cerebras` suffix rejected because
  # Cerebras doesn't host Qwen3-14B specifically; default :fastest picks
  # whichever backend hosts it, currently vLLM/Together/etc).
  # Note: Qwen3 is a reasoning model — like gpt-5, requires max_tokens >= 16+
  # (otherwise reasoning consumes whole budget, content returns null).
  - model_name: qwen-3-14b
    litellm_params:
      model: openai/Qwen/Qwen3-14B
      api_key: os.environ/HF_TOKEN
      api_base: https://router.huggingface.co/v1

  # Slot 5 — Open-weight large: Llama via OpenRouter (fallback; Cerebras primary below)
  # NOTE: resolved to meta-llama/llama-3.3-70b-instruct (EVID-019);
  # llama-4-70b not yet broadly available, 3.3-70b is the closest stable variant.
  # ADR-006: keep as OpenRouter fallback; Cerebras primary is llama-3-3-70b-cerebras.
  - model_name: llama-3-3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── ADR-006 Phase 1 additions — OpenRouter closed APIs ──────────────────────

  # Claude Opus 4.7 via OpenRouter
  - model_name: claude-opus-4-7
    litellm_params:
      model: openrouter/anthropic/claude-opus-4.7
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # GPT-5 (full) via OpenRouter
  - model_name: gpt-5
    litellm_params:
      model: openrouter/openai/gpt-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Gemini 2.5 Pro via OpenRouter
  - model_name: gemini-2-5-pro
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Grok 4 via OpenRouter
  - model_name: grok-4
    litellm_params:
      model: openrouter/x-ai/grok-4
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # DeepSeek V3.5 via OpenRouter
  - model_name: deepseek-v3-5
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── ADR-006 Phase 1 additions — Cerebras direct (fast open-weight) ───────────

  # Llama 3.3 70B via Cerebras (primary; OpenRouter llama-3-3-70b is fallback)
  - model_name: llama-3-3-70b-cerebras
    litellm_params:
      model: cerebras/llama3.3-70b
      api_key: os.environ/CEREBRAS_API_KEY

  # Qwen3 32B via Cerebras
  - model_name: qwen-3-32b
    litellm_params:
      model: cerebras/qwen-3-32b
      api_key: os.environ/CEREBRAS_API_KEY

  # GLM-4.7 via Cerebras
  - model_name: glm-4-7
    litellm_params:
      model: cerebras/glm-4.7
      api_key: os.environ/CEREBRAS_API_KEY

  # gpt-oss-120B via Cerebras
  - model_name: gpt-oss-120b
    litellm_params:
      model: cerebras/gpt-oss-120b
      api_key: os.environ/CEREBRAS_API_KEY

  # ── ADR-006 Phase 1 additions — Runpod vLLM (self-hosted) ───────────────────

  # Qwen 2.5 72B via Runpod vLLM (OpenAI-compatible endpoint)
  # api_base must point to the Runpod pod endpoint (set RUNPOD_VLLM_API_BASE in .env).
  - model_name: qwen-2-5-72b
    litellm_params:
      model: hosted_vllm/Qwen/Qwen2.5-72B-Instruct
      api_base: os.environ/RUNPOD_VLLM_API_BASE
      api_key: os.environ/RUNPOD_VLLM_API_KEY

  # ── Coding-model ladder (be_01 sweep, 2026-06-03) — OpenRouter routes ───────
  # Added to measure a broad coding-model roster (by family, cheap→expensive)
  # on the leaderboard. All non-reasoning -instruct variants picked so raw-llm
  # completion returns content (reasoning variants would burn the token budget).

  # Qwen — coding MoE + big instruct
  - model_name: qwen3-coder-30b
    litellm_params:
      model: openrouter/qwen/qwen3-coder-30b-a3b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: qwen3-235b
    litellm_params:
      model: openrouter/qwen/qwen3-235b-a22b-2507
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # DeepSeek — newer cheaper v3.2 (v3-5 already wired above)
  - model_name: deepseek-v3-2
    litellm_params:
      model: openrouter/deepseek/deepseek-v3.2
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Mistral — Codestral (coding) + Devstral (coding-agent, aider-friendly)
  - model_name: codestral
    litellm_params:
      model: openrouter/mistralai/codestral-2508
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: devstral
    litellm_params:
      model: openrouter/mistralai/devstral-2512
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Llama — small 3.1-8b + Llama-4 Scout (3.3-70b already wired above)
  - model_name: llama-3-1-8b
    litellm_params:
      model: openrouter/meta-llama/llama-3.1-8b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: llama-4-scout
    litellm_params:
      model: openrouter/meta-llama/llama-4-scout
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # GLM — cheap 4-32b (glm-4-7 via Cerebras already wired above)
  - model_name: glm-4-32b
    litellm_params:
      model: openrouter/z-ai/glm-4-32b
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── Frontier-open tier (the "more powerful" candidates, 2026-06-03) ─────────
  # Strong open models — non-judge families (moonshot / z-ai / deepseek), so
  # safe as candidates without tripping self-judging. grok-4 already wired above.

  - model_name: kimi-k2-5
    litellm_params:
      model: openrouter/moonshotai/kimi-k2.5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: glm-5
    litellm_params:
      model: openrouter/z-ai/glm-5
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  - model_name: deepseek-v4-pro
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-pro
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── Judge routes (RFC-002 Phase 3 W1 H1 spike + future JudgePanel) ──────────
  # Separate routes billed to OPENROUTER_API_KEY_JUDGE for billing isolation
  # per RFC-002 NFR-005. Naming convention: <base-model>-judge.
  # Added 2026-05-24 for Phase 3 W1 H1 spike.
  - model_name: claude-sonnet-4-6-judge
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY_JUDGE
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-mini-judge
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY_JUDGE
      api_base: https://openrouter.ai/api/v1
      # gpt-5-mini is a REASONING model: at the default effort it spends the
      # ENTIRE max_tokens budget on reasoning (diagnosed 2026-06-02: 2048/2048
      # reasoning_tokens, finish_reason="length", EMPTY content → unparseable
      # rubric JSON → false 0.0). reasoning_effort=low bounds reasoning (~700
      # tok) so the full rubric JSON fits AND the call is cheaper. This is the
      # EVID-023 remedy ("cap reasoning, don't raise the token cap"). Scoped to
      # the JUDGE alias only — candidate gpt-5 use is unaffected.
      reasoning_effort: low

# General proxy settings
litellm_settings:
  # Prometheus metrics at GET /metrics — DB available so this works.
  # ~15 metric families: litellm_spend_metric, litellm_total_tokens_metric,
  # litellm_request_total_latency_metric, litellm_proxy_total_requests_metric,
  # litellm_deployment_state, etc. Scraped by Prometheus per prometheus.yml.
  callbacks:
    - prometheus
    - otel              # traces → OTEL collector → Tempo (via OTEL_ENDPOINT env)
  success_callback:
    - prometheus
    - otel
  failure_callback:
    - prometheus
    - otel
  telemetry: false                # POLLMEVALS collects its own cost/token data
  request_timeout: 300            # matches RFC-001 error_class=timeout boundary
  drop_params: true               # silently drop unsupported params per-provider (e.g. temperature for GPT-5)

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # DATABASE_URL required — current LiteLLM image rejects /chat/completions with
  # `no_db_connection` HTTP 400 when DB unavailable. Postgres provisioned in
  # docker-compose. Connection string built from POSTGRES_PASSWORD env.
  database_url: os.environ/DATABASE_URL
  # Budget cap (soft backstop; orchestrator enforces NFR-001 $50 hard limit via cost.py)
  max_budget: 50
  budget_duration: "30d"
