# LiteLLM proxy configuration for POLLMEVALS v0.1 smoke run
#
# Routes 5 ADR-003 models via the most reliable backend per provider:
# - 4 closed/popular models via OpenRouter (confirmed working via EVID-019 smoke)
# - qwen-3-14b via HuggingFace router → Cerebras provider
#   (EVID-019 confirmed qwen-3-14b NOT on OpenRouter; HF Inference Providers
#   has Cerebras as backend per HF docs; LiteLLM speaks HF via openai-compatible
#   custom base_url since HF router is OpenAI drop-in)
#
# Slug names confirmed by `make openrouter-smoke` 2026-05-24 (EVID-019).
# Never commit a literal API key — use os.environ/* references only.
# Pulled into the container via volume mount in docker-compose.litellm.yml.

model_list:
  # Slot 1 — Premium closed: Claude Sonnet 4.6 via OpenRouter
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 2 — Mid closed: GPT-5 mini via OpenRouter
  # NOTE: GPT-5 family requires max_tokens >= 16 (reasoning tokens reserved);
  # orchestrator must enforce minimum in request shape.
  - model_name: gpt-5-mini
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 3 — Cheap closed: Gemini 3 Flash via OpenRouter
  # NOTE: resolved to :preview suffix (EVID-019); monitor production stability.
  - model_name: gemini-3-flash
    litellm_params:
      model: openrouter/google/gemini-3-flash-preview
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # Slot 4 — Open-weight: Qwen 3 14B via HuggingFace router (auto-route)
  # Diverges from OpenRouter (NOT on OR per EVID-019); HF picks best backend.
  # LiteLLM treats HF router as OpenAI-compatible via custom base_url.
  # Slug is CASE-SENSITIVE on HF Hub: `Qwen/Qwen3-14B` not `qwen/qwen3-14b`.
  # NO provider suffix — HF auto-routes (`:cerebras` suffix rejected because
  # Cerebras doesn't host Qwen3-14B specifically; default :fastest picks
  # whichever backend hosts it, currently vLLM/Together/etc).
  # Note: Qwen3 is a reasoning model — like gpt-5, requires max_tokens >= 16+
  # (otherwise reasoning consumes whole budget, content returns null).
  - model_name: qwen-3-14b
    litellm_params:
      model: openai/Qwen/Qwen3-14B
      api_key: os.environ/HF_TOKEN
      api_base: https://router.huggingface.co/v1

  # Slot 5 — Open-weight large: Llama via OpenRouter
  # NOTE: resolved to meta-llama/llama-3.3-70b-instruct (EVID-019);
  # llama-4-70b not yet broadly available, 3.3-70b is the closest stable variant.
  - model_name: llama-3-3-70b
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      api_base: https://openrouter.ai/api/v1

  # ── Judge routes (RFC-002 Phase 3 W1 H1 spike + future JudgePanel) ──────────
  # Separate routes billed to OPENROUTER_API_KEY_JUDGE for billing isolation
  # per RFC-002 NFR-005. Naming convention: <base-model>-judge.
  # Added 2026-05-24 for Phase 3 W1 H1 spike.
  - model_name: claude-sonnet-4-6-judge
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4.6
      api_key: os.environ/OPENROUTER_API_KEY_JUDGE
      api_base: https://openrouter.ai/api/v1

  - model_name: gpt-5-mini-judge
    litellm_params:
      model: openrouter/openai/gpt-5-mini
      api_key: os.environ/OPENROUTER_API_KEY_JUDGE
      api_base: https://openrouter.ai/api/v1

# General proxy settings
litellm_settings:
  # Prometheus metrics at GET /metrics — DB available so this works.
  # ~15 metric families: litellm_spend_metric, litellm_total_tokens_metric,
  # litellm_request_total_latency_metric, litellm_proxy_total_requests_metric,
  # litellm_deployment_state, etc. Scraped by Prometheus per prometheus.yml.
  callbacks:
    - prometheus
    - otel              # traces → OTEL collector → Tempo (via OTEL_ENDPOINT env)
  success_callback:
    - prometheus
    - otel
  failure_callback:
    - prometheus
    - otel
  telemetry: false                # POLLMEVALS collects its own cost/token data
  request_timeout: 300            # matches RFC-001 error_class=timeout boundary
  drop_params: true               # silently drop unsupported params per-provider (e.g. temperature for GPT-5)

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # DATABASE_URL required — current LiteLLM image rejects /chat/completions with
  # `no_db_connection` HTTP 400 when DB unavailable. Postgres provisioned in
  # docker-compose. Connection string built from POSTGRES_PASSWORD env.
  database_url: os.environ/DATABASE_URL
  # Budget cap (soft backstop; orchestrator enforces NFR-001 $50 hard limit via cost.py)
  max_budget: 50
  budget_duration: "30d"
