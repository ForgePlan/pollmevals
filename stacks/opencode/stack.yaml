schema_version: pollmevals.stack.v1
slug: opencode
name: OpenCode
base_model_slug: configurable
agent_cli: opencode

# Proven headless-via-proxy 2026-06-02 (memory: research-cli-harness-execution).
# Model-agnostic. Config opencode.json:
#   provider.litellm = { npm: "@ai-sdk/openai-compatible",
#     options: { baseURL: "http://localhost:4000/v1",
#                apiKey: "{env:LITELLM_MASTER_KEY}" },
#     models: { "<MODEL>": { name: "<MODEL>" } } }
# Run: opencode run "<prompt>" -m litellm/<MODEL>

layers:
  L0_bare_llm: false
  L1_system_prompt: true
  L2_tools: true
  L3_skills: true # reads AGENTS.md
  L4_file_memory: true
  L5_vector_memory: false
  L6_subagents: false
  L7_validator: false
  L8_framework: null
execution:
  mode: repository_patch
  command: opencode
  args:
    - run
input_contract:
  receives:
    - task_prompt
    - repository_snapshot
    - allowed_files
output_contract:
  produces:
    - final_answer
    - patch
    - trace
limits:
  max_wall_clock_seconds: 600
  max_tool_calls: 50
  max_input_tokens: 50000
  max_output_tokens: 10000
sandbox:
  network: false
  writable_paths:
    - /workspace
