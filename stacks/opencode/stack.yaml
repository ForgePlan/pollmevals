schema_version: pollmevals.stack.v1
slug: opencode
name: OpenCode
base_model_slug: configurable
agent_cli: opencode

# Model-agnostic (Vercel AI SDK). Recipe codified + smoked 2026-06-03
# (_opencode_invocation in stack_executor.py; memory: research-cli-harness-execution).
# Uses opencode's BUILT-IN `openai` provider (bundled in the binary → no run-time
# npm fetch, works on the no-egress sandbox) with a baseURL override to our proxy.
# config_files writes opencode.json: provider.openai.options.baseURL=<proxy>/v1 +
# models.{<MODEL>}; env OPENAI_API_KEY=$LITELLM_MASTER_KEY.
# Run: opencode run -m openai/<MODEL> "<prompt>"

layers:
  L0_bare_llm: false
  L1_system_prompt: true
  L2_tools: true
  L3_skills: true # reads AGENTS.md
  L4_file_memory: true
  L5_vector_memory: false
  L6_subagents: false
  L7_validator: false
  L8_framework: null
execution:
  mode: repository_patch
  command: opencode
  args:
    - run
input_contract:
  receives:
    - task_prompt
    - repository_snapshot
    - allowed_files
output_contract:
  produces:
    - final_answer
    - patch
    - trace
limits:
  max_wall_clock_seconds: 600
  max_tool_calls: 50
  max_input_tokens: 50000
  max_output_tokens: 10000
sandbox:
  network: false
  writable_paths:
    - /workspace
