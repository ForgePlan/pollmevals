schema_version: pollmevals.stack.v1
slug: goose
name: Goose
base_model_slug: configurable
agent_cli: goose

# Proven headless-via-proxy 2026-06-02 (memory: research-cli-harness-execution).
# Model-agnostic (AAIF / ex-Block), MCP-native tools. Env:
#   GOOSE_PROVIDER=openai  GOOSE_MODEL=<MODEL>
#   OPENAI_API_KEY=$LITELLM_MASTER_KEY
#   OPENAI_HOST=http://localhost:4000  OPENAI_BASE_PATH=v1/chat/completions
# Run: goose run --no-session -t "<prompt>"

layers:
  L0_bare_llm: false
  L1_system_prompt: true
  L2_tools: true
  L3_skills: false
  L4_file_memory: false
  L5_vector_memory: false
  L6_subagents: false
  L7_validator: false
  L8_framework: null
execution:
  mode: repository_patch
  command: goose
  args:
    - run
    - --no-session
input_contract:
  receives:
    - task_prompt
    - repository_snapshot
    - allowed_files
output_contract:
  produces:
    - final_answer
    - patch
    - trace
limits:
  max_wall_clock_seconds: 600
  max_tool_calls: 50
  max_input_tokens: 50000
  max_output_tokens: 10000
sandbox:
  network: false
  writable_paths:
    - /workspace
