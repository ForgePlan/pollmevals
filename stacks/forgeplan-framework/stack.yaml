schema_version: pollmevals.stack.v1
slug: forgeplan-framework
name: ForgePlan Framework
base_model_slug: claude-sonnet
agent_cli: claude-code
layers:
  L0_bare_llm: false
  L1_system_prompt: true
  L2_tools: true
  L3_skills: true
  L4_file_memory: true
  L5_vector_memory: false
  L6_subagents: true
  L7_validator: true
  L8_framework: forgeplan
execution:
  mode: repository_patch_with_validator
  command: forgeplan
  args:
    - run-agent-eval
input_contract:
  receives:
    - task_prompt
    - repository_snapshot
    - forgeplan_context
output_contract:
  produces:
    - final_answer
    - patch
    - trace
    - validator_report
limits:
  max_wall_clock_seconds: 900
  max_tool_calls: 120
  max_input_tokens: 100000
  max_output_tokens: 20000
sandbox:
  network: false
  writable_paths:
    - /workspace
