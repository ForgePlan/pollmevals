schema_version: pollmevals.stack.v1
slug: crush
name: Crush
base_model_slug: configurable
agent_cli: crush
# Charmbracelet's crush: a system-prompted agent (L1) driving file-edit + shell
# tools (L2). Model-agnostic via an openai-compat provider, so it runs the same
# coder models as aider/goose; the board orders harnesses by max true layer,
# placing crush (L2) alongside goose. Recipe codified + smoked 2026-06-03
# (_crush_invocation in stack_executor.py; memory: research-cli-harness-execution):
#   config_files crush.json (provider type=openai-compat, base_url=<proxy>/v1,
#     api_key=$LITELLM_MASTER_KEY, one model) + env LITELLM_MASTER_KEY +
#     CRUSH_GLOBAL_CONFIG=/workspace (dir) + CRUSH_GLOBAL_DATA=/tmp/crushdata.
#   run: crush run -q "<prompt>"  (auto-selects the single configured model)
layers:
  L0_bare_llm: false
  L1_system_prompt: true
  L2_tools: true
  L3_skills: false
  L4_file_memory: false
  L5_vector_memory: false
  L6_subagents: false
  L7_validator: false
  L8_framework: null
execution:
  mode: repository_patch
  command: crush
  args:
    - run
    - -q                        # quiet: non-interactive, hide the spinner
input_contract:
  receives:
    - task_prompt
    - repository_snapshot
    - allowed_files
output_contract:
  produces:
    - final_answer
    - patch
    - trace
limits:
  max_wall_clock_seconds: 600
  max_tool_calls: 50
  max_input_tokens: 50000
  max_output_tokens: 10000
sandbox:
  network: false
  writable_paths:
    - /workspace
