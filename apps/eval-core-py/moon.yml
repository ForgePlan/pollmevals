$schema: 'https://moonrepo.dev/schemas/project.json'

# Python evaluation orchestrator — Inspect AI-compatible task model, LiteLLM
# wrapper, cost attribution, manifest writer, crash recovery.
# Source lives in `src/`; tests in `tests/`.
layer: 'application'
language: 'python'

toolchains:
  python:
    version: '3.12.0'

project:
  name: 'eval-core-py'
  description: 'Python evaluation orchestrator (Inspect AI wrapper, RFC-001).'

tasks:
  build:
    command: 'uv sync'
    toolchain: 'unstable_python'
    inputs:
      - 'pyproject.toml'
      - '/pyproject.toml'

  test:
    command: 'uv run pytest tests/ -v'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:build'

  lint:
    script: 'uv run ruff check src/ tests/ && uv run mypy --strict src/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:build'

  format:
    command: 'uv run ruff format src/ tests/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'

  typecheck:
    command: 'uv run mypy --strict src/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'pyproject.toml'
      - '/pyproject.toml'
    deps:
      - '~:build'
