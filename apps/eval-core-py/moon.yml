$schema: 'https://moonrepo.dev/schemas/project.json'

# Python evaluation orchestrator — Inspect AI-compatible task model, LiteLLM
# wrapper, cost attribution, manifest writer, crash recovery.
# Source lives in `src/`; tests in `tests/`.
layer: 'application'
language: 'python'

toolchains:
  python:
    version: '3.12.0'

project:
  name: 'eval-core-py'
  description: 'Python evaluation orchestrator (Inspect AI wrapper, RFC-001).'

tasks:
  build:
    # --all-extras is load-bearing: a bare `uv sync` prunes the `dev` extra
    # (mypy/pytest/ruff) from the venv, so the dependent `:typecheck`/`:lint`
    # tasks then run mypy in an ephemeral env that can't see pydantic/httpx/…
    # → spurious "Cannot find implementation or library stub" errors. Keep the
    # dev extra installed so mypy resolves the project's own deps.
    command: 'uv sync --all-extras'
    toolchain: 'unstable_python'
    inputs:
      - 'pyproject.toml'
      - '/pyproject.toml'

  test:
    command: 'uv run pytest tests/ -v'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:build'

  lint:
    script: 'uv run ruff check src/ tests/ && uv run mypy --strict src/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
    deps:
      - '~:build'

  format:
    command: 'uv run ruff format src/ tests/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'tests/**/*.py'

  typecheck:
    command: 'uv run mypy --strict src/'
    toolchain: 'unstable_python'
    inputs:
      - 'src/**/*.py'
      - 'pyproject.toml'
      - '/pyproject.toml'
    deps:
      - '~:build'
