description: |
  You are given positive integers N, M, and a sequence A = (A_1, A_2, \dots, A_N) of length N, each element being an integer between 1 and N, inclusive.
  Find the number, modulo 998244353, of sequences x = (x_1, x_2, \dots, x_N) of length N, each element being an integer between 1 and M, inclusive, that satisfy the following condition:

  - x_i \leq x_{A_i} for every i (1 \leq i \leq N).

  Input

  The input is given from Standard Input in the following format:
  N M
  A_1 A_2 \dots A_N

  Output

  Print the answer.

  Constraints


  - 1 \leq N, M \leq 2025
  - 1 \leq A_i \leq N
  - All input values are integer...

prompt_template: |
  You are given positive integers N, M, and a sequence A = (A_1, A_2, \dots, A_N) of length N, each element being an integer between 1 and N, inclusive.
  Find the number, modulo 998244353, of sequences x = (x_1, x_2, \dots, x_N) of length N, each element being an integer between 1 and M, inclusive, that satisfy the following condition:

  - x_i \leq x_{A_i} for every i (1 \leq i \leq N).

  Input

  The input is given from Standard Input in the following format:
  N M
  A_1 A_2 \dots A_N

  Output

  Print the answer.

  Constraints


  - 1 \leq N, M \leq 2025
  - 1 \leq A_i \leq N
  - All input values are integers.

  Sample Input 1

  3 3
  2 1 1

  Sample Output 1

  6

  The sequences x=(1,1,1),(2,2,1),(2,2,2),(3,3,1),(3,3,2),(3,3,3) satisfy the condition.

  Sample Input 2

  4 9
  1 1 1 1

  Sample Output 2

  2025

  Sample Input 3

  10 5
  9 4 5 5 4 2 1 5 7 2

  Sample Output 3

  10010

  ## I/O contract

  Read all input from standard input and write the answer to standard output, matching the formats shown in the examples above.

  Output only a single self-contained program. No prose, no markdown fences.

