# 0.40 correctness + 0.15 coverage + 0.10 complexity + 0.10 lint + 0.10 type_safety + 0.15 pattern_match
weight_components:
  correctness: 0.40
  test_coverage: 0.15
  complexity: 0.10
  linter: 0.10
  type_safety: 0.10
  pattern_match: 0.15

# Calibration sample layout. See ./calibration/<level>/sample-{001..010}.ts.
# Expected final_score (0-10) populated by Anti-SLOP Reviewer Agent after
# evaluator wiring runs in Task #23. n_samples_per_level=10 per RFC-003.
calibration:
  schema: 5-level
  # v0.1 launch baseline: 5 samples per level (25 total). PRD-002 § Q4 target
  # is 10 per level (50 total) for judge MAD < 1.5 stability. v0.2 milestone
  # bumps to 10. RFC-003 amendment 2026-05-26 documents this scope decision.
  n_samples_per_level: 5
  total_samples: 25
  v0_2_target_per_level: 10
  layout: ./calibration/<level>/sample-{001..005}.ts
  levels:
    perfect:
      expected_final_score_range: [9.0, 10.0]
      description: production-ready, satisfies all hard requirements, idiomatic TS
    good:
      expected_final_score_range: [7.0, 8.5]
      description: works, minor issues (one missed edge case, slightly weak error code, suboptimal but safe)
    mediocre:
      expected_final_score_range: [4.5, 6.5]
      description: works on happy path; multiple correctness or security gaps; passes some tests
    poor:
      expected_final_score_range: [2.0, 4.0]
      description: runs but fundamentally insecure; passes few tests; leaks tokens or skips validation
    broken:
      expected_final_score_range: [0.0, 1.5]
      description: does not compile, or compiles but completely fails security model

