description: "ClientSession.get() doesn't support hostname.\n### Describe the bug\r\n\r\nWhen using a\
  \ URI with a hostname for an GET call, an error stating 'Bad value for ai_flags' occurs. When replacing\
  \ the hostname with an IPv4 address, the error no longer occurs. I would like to be able to use the\
  \ hostname instead because I'm trying to connect to a link local IPv6 device.\r\n\r\nI'm trying to do\
  \ a GET request from a device that is directly connected to my PC. The backtrace is down below:\r\n\r\
  \nIt appears that this behavior was introduced around this change: https://github.com/aio-libs/aiohttp/commit/38dd9b8557f35bdfc1376e5833fb8e235c9d49ba\r\
  \n\r\nI've noticed that removing the AI_NUMERICHOST flag causes the error to go away as well. That may\
  \ be connected to this commit: https://github.com/aio-libs/aiohttp/commit/c48f2d1c93e6f166f73ad0100d646952031d664f\r\
  \n\r\nI've ALSO tried reverting to using Python 3.8 with aiohttp 3.10.5 and this error does not occur.\r\
  \n\r\n### To Reproduce\r\n\r\n1. I was able to reproduce the error with the following script:\r\n```\r\
  \nimport aiohttp\r\nimport asyncio\r\n\r\nasync def main():\r\n    url=\"http://<hostname>:80/<loc>/<loc>/<loc>/\"\
  \r\n\r\n    async with aiohttp.ClientSession() as client:\r\n        res = await client.get(url)\r\n\
  \        print(res)\r\n\r\nasyncio.run(main())\r\n```\r\n\r\nI have removed the actual URI information\
  \ for obvious reasons. \r\n\r\n### Expected behavior\r\n\r\nI except the GET request to complete successfully.\r\
  \n\r\n### Logs/tracebacks\r\n```\r\nTraceback (most recent call last):\r\n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\"\
  , line 1301, in _create_direct_connection\r\n    hosts = await self._resolve_host(host, port, traces=traces)\r\
  \n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\", line 911, in\
  \ _resolve_host\r\n    return await asyncio.shield(resolved_host_task)\r\n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\"\
  , line 948, in _resolve_host_with_throttle\r\n    addrs = await self._resolver.resolve(host, port, family=self._family)\r\
  \n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/resolver.py\", line 56, in resolve\r\
  \n    resolved_host, _port = await self._loop.getnameinfo(\r\n  File \"/usr/lib/python3.10/asyncio/base_events.py\"\
  , line 867, in getnameinfo\r\n    return await self.run_in_executor(\r\n  File \"/usr/lib/python3.10/concurrent/futures/thread.py\"\
  , line 58, in run\r\n    result = self.fn(*self.args, **self.kwargs)\r\nsocket.gaierror: [Errno -1]\
  \ Bad value for ai_flags\r\n\r\nThe above exception was the direct cause of the following exception:\r\
  \n\r\nTraceback (most recent call last):\r\n  File \"/home/leenathan2/Desktop/aiohttp_test.py\", line\
  \ 11, in <module>\r\n    asyncio.run(main())\r\n  File \"/usr/lib/python3.10/asyncio/runners.py\", line\
  \ 44, in run\r\n    return loop.run_until_complete(main)\r\n  File \"/usr/lib/python3.10/asyncio/base_events.py\"\
  , line 649, in run_until_complete\r\n    return future.result()\r\n  File \"/home/leenathan2/Desktop/aiohttp_test.py\"\
  , line 8, in main\r\n    res = await client.get(url)\r\n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/client.py\"\
  , line 657, in _request\r\n    conn = await self._connector.connect(\r\n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\"\
  , line 564, in connect\r\n    proto = await self._create_connection(req, traces, timeout)\r\n  File\
  \ \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\", line 975, in _create_connection\r\
  \n    _, proto = await self._create_direct_connection(req, traces, timeout)\r\n  File \"/home/leenathan2/.local/lib/python3.10/site-packages/aiohttp/connector.py\"\
  , line 1307, in _create_direct_connection\r\n    raise ClientConnectorError(req.connection_key, exc)\
  \ from exc\r\naiohttp.client_exceptions.ClientConnectorError: Cannot connect to host <hostname>:80 ssl:default\
  \ [Bad value for ai_flags]\r\n```\r\n\r\n\r\n### Python Version\r\n\r\n```console\r\nPython 3.10.12\r\
  \n```\r\n\r\n\r\n### aiohttp Version\r\n\r\n```console\r\nName: aiohttp\r\nVersion: 3.10.5\r\nSummary:\
