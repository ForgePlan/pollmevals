  Author: \r\nAuthor-email: \r\nLicense: Apache 2\r\nLocation: /home/leenathan2/.local/lib/python3.10/site-packages\r\
  \nRequires: aiohappyeyeballs, aiosignal, async-timeout, attrs, frozenlist, multidict, yarl\r\n```\r\n\
  \r\n\r\n### multidict Version\r\n\r\n```console\r\nName: multidict\r\nVersion: 6.0.5\r\nSummary: multidict\
  \ implementation\r\nHome-page: https://github.com/aio-libs/multidict\r\nAuthor: Andrew Svetlov\r\nAuthor-email:\
  \ andrew.svetlov@gmail.com\r\nLicense: Apache 2\r\nLocation: /home/leenathan2/.local/lib/python3.10/site-packages\r\
  \nRequires: \r\nRequired-by: aiohttp, yarl\r\n```\r\n\r\n\r\n### yarl Version\r\n\r\n```console\r\n\
  Name: yarl\r\nVersion: 1.9.8\r\nSummary: Yet another URL library\r\nHome-page: https://github.com/aio-libs/yarl\r\
  \nAuthor: Andrew Svetlov\r\nAuthor-email: andrew.svetlov@gmail.com\r\nLicense: Apache-2.0\r\nLocation:\
  \ /home/leenathan2/.local/lib/python3.10/site-packages\r\nRequires: idna, multidict\r\nRequired-by:\
  \ aiohttp\r\n```\r\n\r\n\r\n### OS\r\n\r\nUbuntu Linux 22.04\r\n\r\n### Related component\r\n\r\nClient\r\
  \n\r\n### Additional context\r\n\r\n_No response_\r\n\r\n### Code of Conduct\r\n\r\n- [X] I agree to\
  \ follow the aio-libs Code of Conduct"
