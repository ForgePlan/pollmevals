prompt_template: "# Bug fix: crawler-commons/crawler-commons\n\nYou are fixing a real bug in the open-source\
  \ repository `crawler-commons/crawler-commons` at commit `ab9e33a5f9fdb02c57141412867a4ec985135aa7`.\n\
  \n## Issue\n\n[Sitemaps] Sitemap index: stop URL at closing </loc>\n(cf. [Nutch mailing list](https://lists.apache.org/thread.html/8ebcffbe2bd8edafb6030e4f28fceee07aee08a1ce06a94755ee8d74@%3Cuser.nutch.apache.org%3E)\r\
  \n\r\nWith #153 the sitemaps SAX parser handles sitemaps with missing or not properly closed <url> elements.\
  \ This should be also done for sitemap indexes, e.g.:\r\n```\r\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\r\n<sitemapindex>\r\n<sitemap>\r\n<loc>https://www.example.orgl/sitemap1.xml</loc>\r\n<loc>https://www.example.org/sitemap2.xml</loc>\r\
  \n</sitemap>\r\n</sitemapindex>\r\n```\n\n## Task\n\nModify the java source so the reported problem\
  \ is resolved. Produce a patch against the repository at the given base commit that makes the failing\
  \ tests pass without breaking the existing passing tests.\n\nConstraints:\n  - Change only what the\
  \ fix requires; keep the diff minimal and focused.\n  - Do not edit the test files — they are the hidden\
  \ acceptance criteria.\n  - Preserve the existing public API unless the issue explicitly requires a\
  \ change.\n\nOutput a unified diff (git patch) of your source changes.\n"
success_criteria:
- All FAIL_TO_PASS tests in gold/expectations.json pass after the patch is applied.
- All PASS_TO_PASS tests continue to pass (no regression).
- Only source files are changed; test files are left untouched.
